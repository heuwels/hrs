version: 2

builds:
  - main: .
    binary: hrs
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: heuwels
    name: hrs
  # Tags with -alpha, -beta, or -rc suffixes (e.g. v1.4.0-alpha.1)
  # are published as GitHub pre-releases.
  prerelease: auto
