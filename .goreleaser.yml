version: 2

builds:
  - main: .
    binary: hrs
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: heuwels
    name: hrs

brews:
  - repository:
      owner: heuwels
      name: homebrew-tap
    name: hrs
    homepage: "https://github.com/heuwels/hrs"
    description: "Timesheets for your agent — AI-native time tracking with local SQLite storage"
    license: "MIT"
    test: |
      assert_match "hrs", shell_output("#{bin}/hrs version")
    install: |
      bin.install "hrs"
      bash_completion.install "completions/hrs.bash" => "hrs"
      zsh_completion.install "completions/hrs.zsh" => "_hrs"
      fish_completion.install "completions/hrs.fish"
